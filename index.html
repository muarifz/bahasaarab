<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kursus Bahasa Arab</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg-dark: #06152e;
  --card-bg: #0c1f3f;
  --gold: #e6b325;
  --gold-hover: #f5c84c;
  --text-light: #eaeef7;
  --text-muted: #9aa8c5;
  --input-bg: #14294f;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:"Poppins",sans-serif;}

body{
  background: radial-gradient(circle at top,#0b1d3a 0%,#06152e 60%);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.container{width:100%;max-width:420px;}

.card{
  background:var(--card-bg);
  padding:40px 30px;
  border-radius:24px;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  text-align:center;
}

.logo-box{
  width:70px;height:70px;
  background:var(--gold);
  border-radius:16px;
  margin:0 auto 20px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
}

h1{color:var(--gold);font-size:26px;font-weight:700;}
.subtitle{color:var(--gold);font-size:14px;letter-spacing:1px;margin-bottom:20px;}
.welcome{color:var(--text-light);font-weight:600;margin-bottom:8px;}
.desc{color:var(--text-muted);font-size:14px;margin-bottom:25px;}

.form-group{text-align:left;margin-bottom:18px;}
label{font-size:13px;color:var(--text-muted);display:block;margin-bottom:6px;}

input{
  width:100%;
  padding:14px 16px;
  border-radius:12px;
  border:none;
  background:var(--input-bg);
  color:var(--text-light);
  font-size:14px;
  outline:none;
}

button{
  width:100%;
  padding:15px;
  border-radius:14px;
  border:none;
  background:linear-gradient(90deg,var(--gold),#d89c10);
  color:#000;
  font-weight:600;
  font-size:15px;
  cursor:pointer;
  margin-top:10px;
  transition:.3s;
}

button:hover{
  background:linear-gradient(90deg,var(--gold-hover),var(--gold));
  transform:translateY(-2px);
}

.message{
  margin-top:15px;
  font-size:14px;
  color:#ffcc00;
}

@media(max-width:480px){
  .card{padding:30px 20px;}
  h1{font-size:22px;}
}
</style>
</head>

<body>
<div class="container">
  <div class="card">
    
    <div class="logo-box">📖</div>
    
    <h1>Kursus Bahasa Arab</h1>
    <div class="subtitle">BERSAMA MUARIF</div>

    <div class="welcome">Ahlan wa Sahlan ✨</div>
    <div class="desc">
      Silakan masuk untuk melanjutkan progres belajar Anda.
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="dua@kursus.com" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••" required>
      </div>

      <button type="submit">
        Masuk Sekarang →
      </button>
    </form>

    <div class="message" id="responseMessage"></div>

  </div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzQEfKclKL8Sm_Tj0kYhWP00EV9xRmyOMNzuDOfKuXoRdJWJniznFHCL1jerrh1DpH6hQ/exec";

document.getElementById("loginForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify({ email: email, password: password }),
    headers: {
      "Content-Type": "application/json"
    }
  })
  .then(res => res.json())
  .then(data => {
    document.getElementById("responseMessage").innerText = data.message;

    if (data.status === "success") {
      window.location.href = data.redirect; 
    }
  })
  .catch(error => {
    document.getElementById("responseMessage").innerText = "Terjadi kesalahan koneksi.";
  });
});
</script>

</body>
</html>
