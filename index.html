<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Belajar Bahasa Arab bersama Muarif</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }

    .app-container {
      position: relative;
      width: 100%;
      height: 100dvh; /* lebih stabil di mobile modern */
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .loader {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffffff;
      font-size: 16px;
      font-weight: 500;
      color: #333;
      z-index: 10;
    }

    @media (max-width: 768px) {
      .loader {
        font-size: 14px;
        padding: 0 20px;
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <div class="app-container">
    <div class="loader" id="loader">
      Loading Application...
    </div>

    <iframe
      src="https://script.google.com/macros/s/AKfycbzQEfKclKL8Sm_Tj0kYhWP00EV9xRmyOMNzuDOfKuXoRdJWJniznFHCL1jerrh1DpH6hQ/exec"
      loading="lazy"
      allowfullscreen
      onload="document.getElementById('loader').style.display='none';">
    </iframe>
  </div>

</body>
</html>
